# Database (from environment variables)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Settings
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-test-query=SELECT 1

# Teller
teller.base-url=${TELLER_BASE_URL:https://api.teller.io}
teller.mtls.keystore-base64=${TELLER_KEYSTORE_BASE64:}
teller.mtls.keystore-path=${TELLER_KEYSTORE_PATH:}
teller.mtls.keystore-password=${TELLER_KEYSTORE_PASSWORD:}
teller.mtls.key-password=${TELLER_KEY_PASSWORD:${TELLER_KEYSTORE_PASSWORD:}}

teller.application-id=${TELLER_APPLICATION_ID:}
teller.connect-environment=${TELLER_CONNECT_ENV:development}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS (update with your frontend URL)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Logging
logging.level.com.budgettracker=INFO
logging.level.org.springframework.security=WARN

resend.api-key=${RESEND_API_KEY:}
resend.from-email=${RESEND_FROM_EMAIL:}

# Enable scheduling
spring.task.scheduling.enabled=true