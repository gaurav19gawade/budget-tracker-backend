# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Settings
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.maximum-pool-size=5

# Teller
teller.base-url=https://api.teller.io
teller.mtls.keystore-path=${TELLER_KEYSTORE_PATH:}
teller.mtls.keystore-password=${TELLER_KEYSTORE_PASSWORD:}
teller.mtls.key-password=${TELLER_KEY_PASSWORD:${TELLER_KEYSTORE_PASSWORD:}}
teller.application-id=${TELLER_APPLICATION_ID:}
teller.connect-environment=${TELLER_CONNECT_ENV:sandbox}

# JWT
jwt.secret=${JWT_SECRET:}
jwt.expiration=900000
jwt.cookie-name=auth_token
jwt.cookie-secure=false
jwt.refresh-expiration=2592000000
jwt.refresh-cookie-name=refresh_token
jwt.max-sessions=5

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Anthropic ? leave blank locally to disable LLM categorization
# Set ANTHROPIC_API_KEY in Railway environment variables for production
anthropic.api-key=${ANTHROPIC_API_KEY:}
# claude-haiku-4-5-20251001 is cheapest and fastest ? ideal for classification tasks
anthropic.model=${ANTHROPIC_MODEL:claude-haiku-4-5-20251001}

# Scheduling
spring.task.scheduling.enabled=true