# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Settings
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.maximum-pool-size=5

# Teller
teller.base-url=https://api.teller.io
teller.mtls.keystore-path=${TELLER_KEYSTORE_PATH:}
teller.mtls.keystore-password=${TELLER_KEYSTORE_PASSWORD:}
teller.mtls.key-password=${TELLER_KEY_PASSWORD:${TELLER_KEYSTORE_PASSWORD:}}
teller.application-id=${TELLER_APPLICATION_ID:}
teller.connect-environment=${TELLER_CONNECT_ENV:sandbox}

# JWT ? access token
jwt.secret=${JWT_SECRET:}
jwt.expiration=900000
# 15 minutes ? short-lived, refresh token handles session longevity
jwt.cookie-name=auth_token
jwt.cookie-secure=false
# false for local HTTP dev; true in prod via JWT_COOKIE_SECURE env var

# JWT ? refresh token
jwt.refresh-expiration=2592000000
# 30 days in ms
jwt.refresh-cookie-name=refresh_token
jwt.max-sessions=5

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Scheduling (for refresh token cleanup job)
spring.task.scheduling.enabled=true