# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Settings
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.maximum-pool-size=5

## Plaid Configuration (Sandbox/Development)
#plaid.client-id=${PLAID_CLIENT_ID}
#plaid.secret=${PLAID_SECRET}
#plaid.environment=sandbox
#plaid.redirect-uri=http://localhost:3000/oauth-redirect

# Teller
# NOTE:
# - base-url is usually https://api.teller.io (live/dev). Sandbox behavior is tied to access token/environment on Connect side. :contentReference[oaicite:3]{index=3}
teller.base-url=https://api.teller.io

# mTLS keystore (PKCS12) containing Teller client cert + private key
teller.mtls.keystore-path=${TELLER_KEYSTORE_PATH:}
teller.mtls.keystore-password=${TELLER_KEYSTORE_PASSWORD:}
teller.mtls.key-password=${TELLER_KEY_PASSWORD:${TELLER_KEYSTORE_PASSWORD:}}

# Optional: expose to frontend if you want backend to serve these
teller.application-id=${TELLER_APPLICATION_ID:}
teller.connect-environment=${TELLER_CONNECT_ENV:sandbox}

# JWT Configuration
jwt.secret=7pUYUkoNSXhfYd4i1hHmuHZUK9XNezaXbYcDG4xAqBs=
jwt.expiration=86400000
# 24 hours in milliseconds

# CORS
cors.allowed-origins=http://localhost:3000,http://localhost:5173