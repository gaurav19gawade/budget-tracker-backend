# ============================================================================
# LOCAL profile — connects directly to Supabase Postgres (direct connection,
# port 5432, not the pooler). Activate with:
#   SPRING_PROFILES_ACTIVE=local
#
# All real secrets come from environment variables (see .env.example / your
# own run-local.sh) — nothing sensitive lives in this file.
# ============================================================================

# Database — Supabase direct connection.
# DATABASE_URL should look like:
#   jdbc:postgresql://db.<project-ref>.supabase.co:5432/postgres?sslmode=require
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Supabase direct connections are fine with a small Hikari pool for local dev
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-test-query=SELECT 1

# Schema already exists in Supabase — don't let Hibernate try to alter it
# blindly while you're poking around locally. Flip to `update` once you trust
# a change. `validate` will fail fast if entities and DB drift apart, which is
# safer than `update` silently altering your real data.
spring.jpa.hibernate.ddl-auto=validate

# Teller — sandbox
teller.base-url=https://api.teller.io
teller.mtls.keystore-path=${TELLER_KEYSTORE_PATH:}
teller.mtls.keystore-password=${TELLER_KEYSTORE_PASSWORD:}
teller.mtls.key-password=${TELLER_KEY_PASSWORD:${TELLER_KEYSTORE_PASSWORD:}}
teller.application-id=${TELLER_APPLICATION_ID:}
teller.connect-environment=${TELLER_CONNECT_ENV:sandbox}

# JWT — local dev over http, so cookies must not require Secure
jwt.secret=${JWT_SECRET:}
jwt.expiration=900000
jwt.cookie-name=auth_token
jwt.cookie-secure=false
jwt.refresh-expiration=2592000000
jwt.refresh-cookie-name=refresh_token
jwt.max-sessions=5

# CORS — local Vite dev server
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Anthropic — leave ANTHROPIC_API_KEY unset locally to disable categorization
anthropic.api-key=${ANTHROPIC_API_KEY:}
anthropic.model=${ANTHROPIC_MODEL:claude-haiku-4-5-20251001}

# Scheduling — off by default locally so you're not triggering sync/email
# jobs against real Supabase data every time you run the app. Flip to true
# if you actually want to test the scheduler.
spring.task.scheduling.enabled=${SCHEDULING_ENABLED:false}

# Verbose logging for local debugging
logging.level.com.budgettracker=${LOG_LEVEL_APP:DEBUG}
logging.level.org.hibernate.SQL=${LOG_LEVEL_HIBERNATE:WARN}
