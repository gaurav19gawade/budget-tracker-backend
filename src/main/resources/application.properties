# ?? Application ???????????????????????????????????????????????????????????
spring.application.name=budget-tracker
server.port=${PORT:8080}

# ?? Profile ???????????????????????????????????????????????????????????????
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ?? JPA/Hibernate ?????????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Hibernate JDBC batching ? required for saveAll() to use bulk INSERTs
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Open-in-view disabled ? avoids holding a DB connection for the full HTTP lifecycle
spring.jpa.open-in-view=false

# ?? HikariCP connection pool ???????????????????????????????????????????????
# Keep pool small for Render's starter PostgreSQL (max 25 connections allowed)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# How long to wait for a connection from the pool before throwing (30s)
spring.datasource.hikari.connection-timeout=30000

# Idle connections are kept alive with a keepalive ping every 2 minutes.
# This prevents Render's PostgreSQL proxy from killing idle connections,
# which would cause the first query after inactivity to fail + reconnect.
spring.datasource.hikari.keepalive-time=120000

# Max lifetime of a connection in the pool (10 minutes).
# Ensures connections are recycled before the DB or proxy kills them.
spring.datasource.hikari.max-lifetime=600000

# Validates connection before handing it out ? catches stale connections fast
spring.datasource.hikari.connection-test-query=SELECT 1

# ?? JWT Cookie ????????????????????????????????????????????????????????????
jwt.cookie-name=auth_token
jwt.cookie-secure=${JWT_COOKIE_SECURE:true}

# ?? Actuator ?????????????????????????????????????????????????????????????
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ?? Logging ???????????????????????????????????????????????????????????????
# App code: INFO in prod (set to DEBUG via env var during local dev)
logging.level.com.budgettracker=${LOG_LEVEL_APP:INFO}

# Spring Security: very chatty at DEBUG ? WARN in prod is plenty
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}

# Hibernate SQL: only enable via env var when debugging a specific query
logging.level.org.hibernate.SQL=${LOG_LEVEL_HIBERNATE:WARN}
logging.level.org.hibernate.type.descriptor.sql=${LOG_LEVEL_HIBERNATE:WARN}
