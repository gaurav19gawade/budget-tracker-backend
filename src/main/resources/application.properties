# Application
spring.application.name=budget-tracker
server.port=${PORT:8080}

# Profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Hibernate JDBC batching ? required for saveAll() to send bulk INSERTs instead
# of one round trip per row. Without this, saveAll() behaves identically to
# calling save() in a loop. 50 is a reasonable batch size for PostgreSQL.
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# JWT Cookie
jwt.cookie-name=auth_token
jwt.cookie-secure=${JWT_COOKIE_SECURE:true}

# Logging
logging.level.com.budgettracker=DEBUG
logging.level.org.springframework.security=DEBUG